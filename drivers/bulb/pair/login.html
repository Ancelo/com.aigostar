<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; }
    input { width: 100%; padding: 10px; font-size: 16px; margin-top: 6px; margin-bottom: 16px; box-sizing: border-box; }
    label { font-weight: 600; font-size: 14px; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    #error { color: #c0392b; margin-top: 12px; min-height: 20px; }
    h2 { margin-top: 0; }
  </style>
</head>
<body>
  <h2 id="title"></h2>
  <p id="subtitle"></p>

  <label id="emailLabel" for="email"></label>
  <input type="email" id="email" placeholder="name@example.com" autofocus />

  <label id="passwordLabel" for="password"></label>
  <input type="password" id="password" />

  <button id="submit"></button>
  <div id="error"></div>

  <script type="application/javascript">
    // Translate via the app's locale files, falling back to English so the
    // view always renders even if a key or the helper is unavailable.
    function t(key, fallback) {
      try { var v = Homey.__(key); return (v && v !== key) ? v : fallback; }
      catch (e) { return fallback; }
    }
    document.getElementById('title').textContent = t('pair.login.title', 'Sign in to AigoSmart');
    document.getElementById('subtitle').textContent = t('pair.login.subtitle', 'Enter the same email and password you use in the AigoSmart app.');
    document.getElementById('emailLabel').textContent = t('pair.login.email', 'Email');
    document.getElementById('passwordLabel').textContent = t('pair.login.password', 'Password');
    var btn = document.getElementById('submit');
    btn.textContent = t('pair.login.continue', 'Continue');

    function handleClick() {
      var email = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var err = document.getElementById('error');
      err.textContent = '';
      btn.disabled = true;
      Homey.emit('login', { username: email, password: password })
        .then(function (result) {
          if (result && result.needsCode) Homey.showView('verify_code');
          else Homey.showView('list_devices');
        })
        .catch(function (e) {
          btn.disabled = false;
          err.textContent = (e && e.message) || String(e);
        });
    }

    btn.addEventListener('click', handleClick);
    document.getElementById('password').addEventListener('keyup', function (e) {
      if (e.key === 'Enter') handleClick();
    });
  </script>
</body>
</html>
