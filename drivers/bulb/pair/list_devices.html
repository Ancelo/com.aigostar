<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; }
    .device-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0; border-bottom: 1px solid #eee;
    }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    .add-btn { padding: 6px 14px; font-size: 14px; }
    #error { color: #c0392b; margin-top: 12px; min-height: 20px; }
    #status { color: #555; }
  </style>
</head>
<body>
  <h2>Devices found</h2>
  <p id="status">Loading your Aigostar devices...</p>
  <div id="list"></div>
  <div id="error"></div>

  <script type="application/javascript">
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    async function load() {
      try {
        const devices = await Homey.emit('list_devices', {});
        statusEl.textContent = devices.length
          ? `Found ${devices.length} device(s):`
          : 'No devices found on your Aigostar account.';

        devices.forEach((dev) => {
          const row = document.createElement('div');
          row.className = 'device-row';

          const label = document.createElement('span');
          label.textContent = dev.name;

          const btn = document.createElement('button');
          btn.className = 'add-btn';
          btn.textContent = 'Add';

          btn.addEventListener('click', async () => {
            btn.disabled = true;
            btn.textContent = 'Adding...';
            try {
              await Homey.createDevice(dev);
              btn.textContent = 'Added ✓';
            } catch (err) {
              btn.disabled = false;
              btn.textContent = 'Add';
              errorEl.textContent = (err && err.message) || String(err);
            }
          });

          row.appendChild(label);
          row.appendChild(btn);
          listEl.appendChild(row);
        });
      } catch (err) {
        statusEl.textContent = '';
        errorEl.textContent = (err && err.message) || String(err);
      }
    }

    load();
  </script>

  <button id="done">Done</button>
  <script type="application/javascript">
    document.getElementById('done').addEventListener('click', () => {
      Homey.done();
    });
  </script>
</body>
</html>
