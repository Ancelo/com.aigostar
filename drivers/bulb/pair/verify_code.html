<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; }
    input { width: 100%; padding: 10px; font-size: 16px; margin-top: 6px; margin-bottom: 16px; box-sizing: border-box; letter-spacing: 2px; }
    button { padding: 10px 24px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    #error { color: #c0392b; margin-top: 12px; min-height: 20px; }
    p { color: #555; }
    h2 { margin-top: 0; }
  </style>
</head>
<body>
  <h2 id="title"></h2>
  <p id="subtitle"></p>

  <input type="text" id="code" placeholder="123456" autofocus />
  <button id="submit"></button>
  <div id="error"></div>

  <script type="application/javascript">
    function t(key, fallback) {
      try { var v = Homey.__(key); return (v && v !== key) ? v : fallback; }
      catch (e) { return fallback; }
    }
    var LBL_CONTINUE = t('pair.verify_code.continue', 'Continue');
    document.getElementById('title').textContent = t('pair.verify_code.title', 'Verification code');
    document.getElementById('subtitle').textContent = t('pair.verify_code.subtitle', 'Aigostar sent a verification code to your email. Enter it below to continue.');

    var errorEl = document.getElementById('error');
    var submitBtn = document.getElementById('submit');
    submitBtn.textContent = LBL_CONTINUE;

    submitBtn.addEventListener('click', function () {
      errorEl.textContent = '';
      var code = document.getElementById('code').value.trim();
      if (!code) {
        errorEl.textContent = t('pair.verify_code.enterCode', 'Please enter the code.');
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = t('pair.verify_code.verifying', 'Verifying…');
      Homey.emit('verify_code', { code: code })
        .then(function () { Homey.showView('list_devices'); })
        .catch(function (err) { errorEl.textContent = (err && err.message) || String(err); })
        .finally(function () {
          submitBtn.disabled = false;
          submitBtn.textContent = LBL_CONTINUE;
        });
    });
  </script>
</body>
</html>
